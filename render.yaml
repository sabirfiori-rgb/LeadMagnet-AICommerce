services:
  - type: web
    name: leadmagnet-aicommerce
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm --prefix backend ci --include=dev && npm --prefix backend run prisma:generate && npm --prefix backend run build && npm --prefix frontend ci --include=dev && npm --prefix frontend run build
    startCommand: npm --prefix backend run start:production
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leadmagnet-aicommerce-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: leadmagnet-aicommerce-db
    region: singapore
    plan: free
